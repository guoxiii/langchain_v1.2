# docker-compose.yml

version: "3.9"
services:
  # === Neo4j 知識圖譜資料庫 ===
  neo4j:
    image: neo4j:5.26-community
    container_name: knowledge-hub-neo4j
    ports:
      - "7474:7474"    # Browser UI
      - "7687:7687"    # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/your-secure-password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
  # === PostgreSQL（Checkpointer 用）===
  postgres:
    image: postgres:16
    container_name: knowledge-hub-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: knowledge_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your-secure-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
  # === Streamlit 問答介面 ===
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-hub-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      POSTGRES_URI: postgresql://postgres:your-secure-password@postgres:5432/knowledge_hub
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0
  # === Streamlit 管理後台 ===
  streamlit-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-hub-admin
    ports:
      - "8502:8502"
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      POSTGRES_URI: postgresql://postgres:your-secure-password@postgres:5432/knowledge_hub
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: streamlit run ui/admin_app.py --server.port=8502 --server.address=0.0.0.0
volumes:
  neo4j_data:
  postgres_data:
